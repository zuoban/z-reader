services:
  z-reader:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/zuoban/z-reader:latest
    container_name: z-reader
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
    environment:
      - APP_PASSWORD=${APP_PASSWORD:?APP_PASSWORD is required}
      - APP_PORT=8080
      - UPLOAD_DIR=/app/uploads
      - DB_PATH=/app/data/data.db
      - MAX_UPLOAD_BYTES=${MAX_UPLOAD_BYTES:-268435456}
      - TTS_CACHE_DIR=/app/data/tts-cache
      - TTS_CACHE_MAX_BYTES=${TTS_CACHE_MAX_BYTES:-67108864}
      - TTS_CACHE_MAX_ITEMS=${TTS_CACHE_MAX_ITEMS:-128}
      - TTS_CACHE_TTL_SECONDS=${TTS_CACHE_TTL_SECONDS:-86400}
      - TTS_MAX_CONCURRENCY=${TTS_MAX_CONCURRENCY:-3}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

