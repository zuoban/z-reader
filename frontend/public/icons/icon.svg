<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 200" fill="none">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgRadial" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e2a3a"/>
      <stop offset="60%" stop-color="#121c2e"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </radialGradient>

    <!-- Subtle ambient glow -->
    <radialGradient id="ambientGlow" cx="50%" cy="48%" r="40%">
      <stop offset="0%" stop-color="#2a3a5a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2a3a5a" stop-opacity="0"/>
    </radialGradient>

    <!-- Cover gradients -->
    <linearGradient id="coverLeft" x1="40" y1="38" x2="96" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2d3436"/>
      <stop offset="100%" stop-color="#1e272e"/>
    </linearGradient>
    <linearGradient id="coverRight" x1="96" y1="38" x2="152" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#252c30"/>
      <stop offset="100%" stop-color="#1a2228"/>
    </linearGradient>

    <!-- Page gradients -->
    <linearGradient id="pageLeft" x1="44" y1="42" x2="96" y2="146" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fffef9"/>
      <stop offset="100%" stop-color="#f5eedd"/>
    </linearGradient>
    <linearGradient id="pageRight" x1="96" y1="42" x2="148" y2="146" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f8f2e4"/>
      <stop offset="100%" stop-color="#ebe3cc"/>
    </linearGradient>

    <!-- Spine gradient -->
    <linearGradient id="spine" x1="94" y1="38" x2="98" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#b8942e"/>
    </linearGradient>

    <!-- Gold accent -->
    <linearGradient id="goldAccent" x1="0" y1="0" x2="192" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#f4e4a6"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>

    <!-- Text gradients -->
    <linearGradient id="headingText" x1="52" y1="0" x2="90" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3d3528"/>
      <stop offset="100%" stop-color="#5a4d3a"/>
    </linearGradient>
    <linearGradient id="bodyText" x1="50" y1="0" x2="92" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8a7e6b"/>
      <stop offset="100%" stop-color="#a09580"/>
    </linearGradient>
    <linearGradient id="bodyTextRight" x1="100" y1="0" x2="142" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8a7e6b"/>
      <stop offset="100%" stop-color="#958a75"/>
    </linearGradient>

    <!-- Image gradient -->
    <linearGradient id="imageGrad" x1="102" y1="68" x2="140" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d6cec0"/>
      <stop offset="100%" stop-color="#c4b8a8"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="dropShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="bookGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feComposite operator="over" in="SourceGraphic"/>
    </filter>

    <!-- Clip paths -->
    <clipPath id="pageClipLeft">
      <path d="M44 46C44 42.7 46.7 40 50 40H86C92.6 40 96 43.4 96 50V146C92 142 86 140 80 140H50C46.7 140 44 137.3 44 134V46Z"/>
    </clipPath>
    <clipPath id="pageClipRight">
      <path d="M148 46C148 42.7 145.3 40 142 40H106C99.4 40 96 43.4 96 50V146C100 142 106 140 112 140H142C145.3 140 148 137.3 148 134V46Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="192" height="200" rx="42" fill="url(#bgRadial)"/>

  <!-- Ambient glow behind book -->
  <ellipse cx="96" cy="96" rx="68" ry="58" fill="url(#ambientGlow)"/>

  <!-- Subtle star/dot pattern -->
  <circle cx="35" cy="30" r="0.6" fill="#ffffff" opacity="0.15"/>
  <circle cx="155" cy="25" r="0.5" fill="#ffffff" opacity="0.12"/>
  <circle cx="160" cy="55" r="0.7" fill="#ffffff" opacity="0.1"/>
  <circle cx="30" cy="60" r="0.5" fill="#ffffff" opacity="0.12"/>
  <circle cx="40" cy="130" r="0.6" fill="#ffffff" opacity="0.1"/>
  <circle cx="155" cy="135" r="0.5" fill="#ffffff" opacity="0.12"/>
  <circle cx="165" cy="165" r="0.6" fill="#ffffff" opacity="0.08"/>
  <circle cx="28" cy="170" r="0.5" fill="#ffffff" opacity="0.1"/>
  <circle cx="50" cy="175" r="0.4" fill="#ffffff" opacity="0.08"/>
  <circle cx="145" cy="175" r="0.5" fill="#ffffff" opacity="0.08"/>

  <!-- Subtle concentric rings behind book -->
  <circle cx="96" cy="95" r="55" stroke="#4a6a8a" stroke-width="0.3" opacity="0.06"/>
  <circle cx="96" cy="95" r="42" stroke="#4a6a8a" stroke-width="0.3" opacity="0.04"/>
  <circle cx="96" cy="95" r="30" stroke="#4a6a8a" stroke-width="0.3" opacity="0.03"/>

  <!-- ==================== BOOK COVER ==================== -->

  <!-- Cover shadow -->
  <g filter="url(#dropShadow)">
    <!-- Left cover -->
    <path d="M40 44C40 40 43.5 38 48 38H84C93.4 38 98 42.6 98 52V148C94 144 86 142 80 142H48C43.5 142 40 140 40 136V44Z" fill="url(#coverLeft)"/>
    <!-- Right cover -->
    <path d="M152 44C152 40 148.5 38 144 38H108C98.6 38 94 42.6 94 52V148C98 144 106 142 112 142H144C148.5 142 152 140 152 136V44Z" fill="url(#coverRight)"/>
  </g>

  <!-- Cover gold border -->
  <path d="M42 44C42 41 44.5 39.5 49 39.5H83C91.6 39.5 96.5 44.4 96.5 52" stroke="url(#goldAccent)" stroke-width="0.8" opacity="0.5"/>
  <path d="M150 44C150 41 147.5 39.5 143 39.5H109C100.4 39.5 95.5 44.4 95.5 52" stroke="url(#goldAccent)" stroke-width="0.8" opacity="0.5"/>

  <!-- ==================== BOOK PAGES ==================== -->

  <!-- Left page -->
  <path d="M44 46C44 42.7 46.7 40 50 40H86C92.6 40 96 43.4 96 50V146C92 142 86 140 80 140H50C46.7 140 44 137.3 44 134V46Z" fill="url(#pageLeft)"/>

  <!-- Right page -->
  <path d="M148 46C148 42.7 145.3 40 142 40H106C99.4 40 96 43.4 96 50V146C100 142 106 140 112 140H142C145.3 140 148 137.3 148 134V46Z" fill="url(#pageRight)"/>

  <!-- Page edge shadow (center fold) -->
  <path d="M96 50V146" stroke="#c4b898" stroke-width="3" opacity="0.3"/>
  <path d="M96 50V146" stroke="#a89878" stroke-width="1" opacity="0.2"/>

  <!-- Page thickness lines at top -->
  <path d="M44 46C44 42.7 46.7 40 50 40H86C92.6 40 96 43.4 96 50" stroke="#e8dfc8" stroke-width="0.8" opacity="0.6"/>
  <path d="M148 46C148 42.7 145.3 40 142 40H106C99.4 40 96 43.4 96 50" stroke="#ddd4bc" stroke-width="0.8" opacity="0.6"/>

  <!-- Subtle page curve -->
  <path d="M48 55 Q62 48 96 44" stroke="#d4c8a8" stroke-width="0.4" opacity="0.4"/>
  <path d="M144 55 Q130 48 96 44" stroke="#ccc0a4" stroke-width="0.4" opacity="0.4"/>

  <!-- ==================== LEFT PAGE CONTENT ==================== -->

  <g clip-path="url(#pageClipLeft)">
    <!-- Chapter ornament -->
    <circle cx="70" cy="56" r="8" fill="none" stroke="#c9a84c" stroke-width="0.6" opacity="0.5"/>
    <text x="70" y="59" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-weight="bold" fill="#a88c3a">I</text>

    <!-- Heading -->
    <rect x="52" y="70" width="32" height="2.5" rx="1.25" fill="url(#headingText)" opacity="0.7"/>
    <rect x="52" y="76" width="24" height="2.5" rx="1.25" fill="url(#headingText)" opacity="0.5"/>

    <!-- Decorative divider -->
    <line x1="50" y1="83" x2="90" y2="83" stroke="#c9a84c" stroke-width="0.5" opacity="0.4" stroke-linecap="round"/>
    <circle cx="70" cy="83" r="1.2" fill="#c9a84c" opacity="0.5"/>

    <!-- Body paragraphs -->
    <rect x="50" y="89" width="36" height="1.2" rx="0.6" fill="url(#bodyText)" opacity="0.45"/>
    <rect x="50" y="93" width="34" height="1.2" rx="0.6" fill="url(#bodyText)" opacity="0.4"/>
    <rect x="50" y="97" width="38" height="1.2" rx="0.6" fill="url(#bodyText)" opacity="0.45"/>
    <rect x="50" y="101" width="32" height="1.2" rx="0.6" fill="url(#bodyText)" opacity="0.4"/>
    <rect x="50" y="105" width="36" height="1.2" rx="0.6" fill="url(#bodyText)" opacity="0.45"/>
    <rect x="50" y="109" width="28" height="1.2" rx="0.6" fill="url(#bodyText)" opacity="0.4"/>

    <!-- Quote block -->
    <rect x="52" y="115" width="32" height="12" rx="2" fill="#e8e0cc" opacity="0.3"/>
    <line x1="54" y1="118" x2="54" y2="125" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <rect x="58" y="119" width="22" height="1" rx="0.5" fill="#8a7e6b" opacity="0.4"/>
    <rect x="58" y="122" width="18" height="1" rx="0.5" fill="#8a7e6b" opacity="0.35"/>
    <rect x="58" y="125" width="16" height="1" rx="0.5" fill="#8a7e6b" opacity="0.4"/>

    <!-- Page folio -->
    <text x="70" y="138" text-anchor="middle" font-family="Georgia, serif" font-size="5.5" fill="#a09580" opacity="0.5">5</text>
  </g>

  <!-- ==================== RIGHT PAGE CONTENT ==================== -->

  <g clip-path="url(#pageClipRight)">
    <!-- Section heading -->
    <rect x="102" y="54" width="28" height="2" rx="1" fill="url(#bodyTextRight)" opacity="0.5"/>
    <rect x="102" y="59" width="34" height="1.2" rx="0.6" fill="url(#bodyTextRight)" opacity="0.4"/>

    <!-- Illustration -->
    <rect x="102" y="66" width="38" height="22" rx="3" fill="url(#imageGrad)" opacity="0.35"/>
    <rect x="102" y="66" width="38" height="22" rx="3" fill="none" stroke="#b8a898" stroke-width="0.5" opacity="0.4"/>

    <!-- Landscape in illustration -->
    <path d="M104 84 L114 72 L124 80 L132 70 L138 84 Z" fill="#c4b8a8" opacity="0.3"/>
    <circle cx="134" cy="72" r="3" fill="#d4c8b8" opacity="0.35"/>
    <path d="M108 84 L118 76 L124 82 L130 74 L136 84" stroke="#b0a494" stroke-width="0.5" fill="none" opacity="0.4"/>

    <!-- Caption -->
    <rect x="108" y="92" width="22" height="1" rx="0.5" fill="#958a75" opacity="0.35"/>
    <rect x="112" y="95" width="16" height="1" rx="0.5" fill="#958a75" opacity="0.3"/>

    <!-- Body text -->
    <rect x="102" y="101" width="36" height="1.2" rx="0.6" fill="url(#bodyTextRight)" opacity="0.45"/>
    <rect x="102" y="105" width="38" height="1.2" rx="0.6" fill="url(#bodyTextRight)" opacity="0.4"/>
    <rect x="102" y="109" width="34" height="1.2" rx="0.6" fill="url(#bodyTextRight)" opacity="0.45"/>
    <rect x="102" y="113" width="36" height="1.2" rx="0.6" fill="url(#bodyTextRight)" opacity="0.4"/>

    <!-- Bullet list -->
    <circle cx="106" cy="121" r="1" fill="#c9a84c" opacity="0.4"/>
    <rect x="110" y="120" width="22" height="1.2" rx="0.6" fill="url(#bodyTextRight)" opacity="0.35"/>
    <circle cx="106" cy="127" r="1" fill="#c9a84c" opacity="0.4"/>
    <rect x="110" y="126" width="18" height="1.2" rx="0.6" fill="url(#bodyTextRight)" opacity="0.35"/>

    <!-- Page folio -->
    <text x="122" y="138" text-anchor="middle" font-family="Georgia, serif" font-size="5.5" fill="#958a75" opacity="0.5">6</text>
  </g>

  <!-- ==================== SPINE ==================== -->

  <!-- Main spine line -->
  <path d="M96 50V146" stroke="url(#spine)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Spine highlight -->
  <path d="M97 52V144" stroke="#e8d888" stroke-width="0.5" opacity="0.25"/>

  <!-- Spine ornaments -->
  <circle cx="96" cy="68" r="1.5" fill="#c9a84c" opacity="0.5"/>
  <circle cx="96" cy="128" r="1.5" fill="#c9a84c" opacity="0.5"/>

  <!-- ==================== BRAND SECTION ==================== -->

  <!-- Divider -->
  <line x1="42" y1="156" x2="150" y2="156" stroke="url(#goldAccent)" stroke-width="0.5" stroke-linecap="round" opacity="0.4"/>
  <circle cx="96" cy="156" r="2" fill="#c9a84c" opacity="0.4"/>

  <!-- Brand text -->
  <text x="96" y="174" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#f5eedd" letter-spacing="1">
    <tspan fill="#f4e4a6" font-weight="700">Z</tspan>
    <tspan fill="#f5eedd" font-weight="400"> Reader</tspan>
  </text>

  <!-- Tagline -->
  <text x="96" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="5" fill="#8a7e6b" letter-spacing="1.2" opacity="0.5">
    READ WITH CLARITY
  </text>

  <!-- Bottom decorative dots -->
  <circle cx="82" cy="190" r="0.8" fill="#c9a84c" opacity="0.25"/>
  <circle cx="96" cy="190" r="0.8" fill="#c9a84c" opacity="0.35"/>
  <circle cx="110" cy="190" r="0.8" fill="#c9a84c" opacity="0.25"/>
</svg>
